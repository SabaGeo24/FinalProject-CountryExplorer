<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CountryExplorer</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <nav>
      <span class="nav__logo">CountryExplorer</span>
      <div class="nav__links">
        <a href="About.html">AboutMe</a>
        <a href="saved.html">Saved</a>
      </div>
      <div class="nav__actions">
        <span id="nav-user"></span>
        <button id="logout-btn" type="button">Logout</button>
      </div>
    </nav>
  </header>

  <main>

    <!-- search / filter form -->
    <section>
      <form id="search-form" action="/submit" method="GET">
        <!-- add your inputs here (at least 3 different types) -->
        <label for="region"> pick Continent </label>
        <select id="region" name="region" required>
           <option value="">-- Select a Continent --</option>
           <option value="europe">Europe</option>
           <option value="asia">Asia</option>
           <option value="africa">Africa</option>
           <option value="south-america">South America</option>
           <option value="north-america">North America</option>
           <option value="australia">Australia</option>
       </select>
       <label for="Population"> Minimum Population </label>
       <input type="number" id="Population" class="population" name="Population" min="0" max="1500000000"  placeholder="100000" required>
       <label for="isLandlocked"> Is Landlocked? </label>
       <input type="checkbox" id="isLandlocked" class="isLandlocked" name="isLandlocked">
       <button type="submit">Search</button>
      </form>
    </section>

    <!-- loading and error states -->
    <p id="loading-msg" hidden>Loading…</p>
    <p id="error-msg" hidden></p>

    <!-- dynamically generated cards land here -->
    <section>
      <div id="results-grid"></div>
    </section>

  </main>

  <footer>
    <!-- footer content -->
    <p> hello this is a footer </p>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
