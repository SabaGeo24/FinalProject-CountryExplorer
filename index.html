<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CountryExplorer</title>
  <link rel="icon" href="data:;base64,=">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <nav class="nav">
      <span class="nav__logo">CountryExplorer</span>
      <div class="nav__links">
        <a class="nav__link" href="About.html">AboutMe</a>
      </div>
    </nav>
  </header>

  <main class="main">
    <section class="search-form">
      <form class="search-form__form" id="search-form">

        <label class="search-form__label" for="startingLetter">Starts With</label>
        <input class="search-form__input" type="text" id="startingLetter" name="startingLetter" maxlength="1" pattern="[A-Za-z]" placeholder="A">

        <label class="search-form__label" for="region">Pick Continent</label>
        <select class="search-form__select" id="region" name="region" required>
          <option value="">-- Select a Continent --</option>
          <option value="europe">Europe</option>
          <option value="asia">Asia</option>
          <option value="africa">Africa</option>
          <option value="south-america">South America</option>
          <option value="north-america">North America</option>
          <option value="australia">Australia</option>
        </select>

        <label class="search-form__label" for="population">Minimum Population</label>
        <input class="search-form__input search-form__input--population" type="number" id="population" name="population" min="0" max="1500000000" placeholder="100000" required>

        <label class="search-form__label" for="isLandlocked">Is Landlocked?</label>
        <input class="search-form__checkbox" type="checkbox" id="isLandlocked" name="isLandlocked">

        <button class="search-form__button" type="submit">Search</button>
      </form>
    </section>

    <p class="status-msg status-msg--loading" id="loading-msg" hidden>Loading…</p>
    <p class="status-msg status-msg--error" id="error-msg" hidden></p>

    <section class="results">
      <div class="results__grid" id="results-grid"></div>
    </section>
  </main>

  <footer class="footer">
    <a class="footer__link" href="saved.html">If you want to check your favorite saved countries, click me!</a>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
