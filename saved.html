<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saved — CountryExplorer</title>
  <link rel="stylesheet" href="css/SaveStyle.css">
</head>
<body>
  <header class="header">
    <h1 class="header__title">Saved Countries</h1>
    <section class="header__description">
      <span class="header__text">In here you will see all of your favorite countries you have saved</span>
    </section>
  </header>

  <main class="main">
    <section class="saved">
      <h2 class="saved__title">Saved Items</h2>
      <p class="saved__empty" id="saved-empty" hidden>Nothing saved yet.</p>
      <div class="saved__grid" id="saved-grid"></div>
    </section>
  </main>

  <footer class="footer">
    <a class="footer__link" href="index.html">To get back to searching and saving, click me!</a>
  </footer>

  <script type="module" src="js/saved.js"></script>
</body>
</html>
